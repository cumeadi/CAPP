name: Build & Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install --omit=dev --ignore-scripts
        continue-on-error: true

      - name: Build wallet
        run: |
          cd apps/wallet
          npm install
          npm run build
        continue-on-error: true

      - name: Build web
        run: |
          cd apps/web
          npm install
          npm run build
        continue-on-error: true

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Verify Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "ERROR: Docker Hub credentials not configured"
            echo "Please set DOCKER_HUB_USERNAME and DOCKER_HUB_TOKEN secrets in GitHub"
            exit 1
          fi
          echo "✅ Docker Hub credentials configured"
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/capp:api-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push wallet image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/wallet/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/capp:wallet-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/capp:web-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: success()

    steps:
      - uses: actions/checkout@v4
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Get DigitalOcean App ID
        id: app
        run: |
          APP_ID=$(doctl apps list --format ID --no-header | head -1)
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
      
      - name: Create deployment
        run: |
          doctl apps create-deployment ${{ steps.app.outputs.app_id }}
      
      - name: Wait for deployment
        run: |
          for i in {1..60}; do
            STATUS=$(doctl apps get ${{ steps.app.outputs.app_id }} --format Status --no-header)
            if [ "$STATUS" = "ACTIVE" ] || [ "$STATUS" = "DEGRADED" ]; then
              echo "Deployment complete with status: $STATUS"
              exit 0
            fi
            echo "Waiting... (attempt $i/60)"
            sleep 10
          done
          echo "Deployment timeout"
          exit 1
      
      - name: Verify deployment
        run: |
          DOMAIN=$(doctl apps get ${{ steps.app.outputs.app_id }} --format DefaultDomain --no-header)
          echo "App deployed at: https://$DOMAIN"
          curl -f https://$DOMAIN/api/health || echo "Health check pending..."

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "status=✅ Deployment successful!" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Deployment failed!" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CAPP Deployment*\n${{ steps.status.outputs.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
