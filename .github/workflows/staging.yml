name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-staging:
    name: Build Staging Images
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build staging images
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/capp:api-staging .
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/capp:wallet-staging apps/wallet/
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/capp:web-staging apps/web/
          
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/capp:api-staging
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/capp:wallet-staging
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/capp:web-staging

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Deploy staging
        run: |
          # If you have a separate staging app, deploy to it
          # Otherwise, deploy to the main app with staging tag
          doctl apps list
          echo "Note: Deploy to staging app or use separate configuration"

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Wait for services
        run: sleep 30
      
      - name: Test staging endpoints
        run: |
          STAGING_URL="https://capp-staging.ondigitaloceans.app"
          
          echo "Testing API health..."
          curl -f $STAGING_URL/api/health || echo "Health check failed (may be deploying)"
          
          echo "Testing wallet frontend..."
          curl -f $STAGING_URL/ || echo "Wallet frontend not ready"
          
          echo "Testing web frontend..."
          curl -f $STAGING_URL/app || echo "Web frontend not ready"
        continue-on-error: true

  notify-staging:
    name: Send Staging Notification
    runs-on: ubuntu-latest
    needs: [build-staging, deploy-staging, integration-tests]
    if: always()
    
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🔄 CAPP Staging Deployment Update",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Staging deployment in progress\nBranch: develop\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
