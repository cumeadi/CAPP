[tool.poetry]
name = "capp-sdk"
version = "0.1.0"
description = "Python SDK for the CAPP Network"
authors = ["Canza Foundation <hello@canza.io>"]
readme = "README.md"
packages = [{include = "capp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
httpx = "^0.27.0"
pydantic = "^2.6.0"
tenacity = "^8.2.3"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.5"
respx = "^0.21.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
